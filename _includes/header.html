<header class="container mx-auto xl:px-0 xl:max-w-3xl px-5">
  <div class="flex justify-between items-center py-5 border-b">

    <!-- Logo (Left) -->
    <a
      href="{{ '/' | relative_url }}"
      class="group inline-flex items-center text-l tracking-widest"
    >
      <span class="font-semibold">RINKOSE</span>
      <span class="text-gray-400 font-semibold">.LT</span>
    </a>

    <!-- Icons (Right) -->
    <div class="flex items-center gap-1">

      <!-- Privacy Link with Tooltip -->
      <a
        href="{{ '/privacy/' | relative_url }}"
        class="group relative inline-flex items-center justify-center w-10 h-10 rounded-lg text-gray-500 hover:text-black transition-colors duration-200"
      >
        <!-- Hover Background (Fade In) -->
        <div class="absolute inset-0 bg-gray-100 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-200"></div>

        <!-- Icon -->
        <svg class="relative w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
        </svg>

        <!-- Tooltip Popup (Below Icon, White, Shadow, Instant) -->
        <div class="absolute top-full mt-2 px-3 py-1.5 bg-white text-gray-900 text-xs font-medium rounded-md shadow-md border border-gray-200 invisible group-hover:visible whitespace-nowrap pointer-events-none z-10">
          Privatumo politika
        </div>
      </a>

      <!-- Terms Link with Tooltip -->
      <a
        href="{{ '/terms/' | relative_url }}"
        class="group relative inline-flex items-center justify-center w-10 h-10 rounded-lg text-gray-500 hover:text-black transition-colors duration-200"
      >
        <!-- Hover Background (Fade In) -->
        <div class="absolute inset-0 bg-gray-100 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-200"></div>

        <!-- Icon -->
        <svg class="relative w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>

        <!-- Tooltip Popup (Below Icon, White, Shadow, Instant) -->
        <div class="absolute top-full mt-2 px-3 py-1.5 bg-white text-gray-900 text-xs font-medium rounded-md shadow-md border border-gray-200 invisible group-hover:visible whitespace-nowrap pointer-events-none z-10">
          Naudojimosi taisyklės ir sąlygos
        </div>
      </a>

      <!-- About Link with Tooltip -->
      <a
        href="{{ '/about/' | relative_url }}"
        class="group relative inline-flex items-center justify-center w-10 h-10 rounded-lg text-gray-500 hover:text-black transition-colors duration-200"
      >
        <!-- Hover Background (Fade In) -->
        <div class="absolute inset-0 bg-gray-100 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-200"></div>

        <!-- Icon -->
        <svg class="relative w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M6 20c0-3.31 2.69-6 6-6s6 2.69 6 6" />
        </svg>            
        
        <!-- Tooltip Popup (Below Icon, White, Shadow, Instant) -->
        <div class="absolute top-full mt-2 px-3 py-1.5 bg-white text-gray-900 text-xs font-medium rounded-md shadow-md border border-gray-200 invisible group-hover:visible whitespace-nowrap pointer-events-none z-10">
          Apie projektą
        </div>
      </a>

    </div>

  </div>
</header>
